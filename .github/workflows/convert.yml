name: Auto Convert All Clash

on:

  # 任意提交自动运行（忽略 yaml）
  push:
    paths-ignore:
      - '*.yaml'

  # 手动运行
  workflow_dispatch:

  # 每6小时自动运行一次
  schedule:
    - cron: '0 */6 * * *'

jobs:

  convert:

    runs-on: ubuntu-latest

    steps:

      # 拉取仓库
      - name: Checkout
        uses: actions/checkout@v4

      # 下载 subconverter
      - name: Download Subconverter
        run: |

          wget https://github.com/tindy2013/subconverter/releases/latest/download/subconverter_linux64.tar.gz

          tar -zxvf subconverter_linux64.tar.gz

      # 启动 subconverter
      - name: Start Subconverter
        run: |

          chmod +x subconverter/subconverter

          cd subconverter

          nohup ./subconverter > /dev/null 2>&1 &

          sleep 15

      # 转换 HMQ
      - name: Convert HMQ
        run: |

          curl "http://127.0.0.1:25500/sub?target=clash&url=https://raw.githubusercontent.com/JettKing/Nodal/main/HMQ006&emoji=true&udp=true&tfo=true&scv=true&insert=false&config=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini" -o HMQ006.yaml

      # 转换 HYL
      - name: Convert HYL
        run: |

          curl "http://127.0.0.1:25500/sub?target=clash&url=https://raw.githubusercontent.com/JettKing/Nodal/main/HYL001&emoji=true&udp=true&tfo=true&scv=true&insert=false&config=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini" -o HYL001.yaml

      # 转换 LXS
      - name: Convert LXS
        run: |

          curl "http://127.0.0.1:25500/sub?target=clash&url=https://raw.githubusercontent.com/JettKing/Nodal/main/LXS004&emoji=true&udp=true&tfo=true&scv=true&insert=false&config=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini" -o LXS004.yaml

      # 转换 FYH
      - name: Convert FYH
        run: |

          curl "http://127.0.0.1:25500/sub?target=clash&url=https://raw.githubusercontent.com/JettKing/Nodal/main/FYH002&emoji=true&udp=true&tfo=true&scv=true&insert=false&config=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini" -o FYH002.yaml

      # 转换 WXQ
      - name: Convert WXQ
        run: |

          curl "http://127.0.0.1:25500/sub?target=clash&url=https://raw.githubusercontent.com/JettKing/Nodal/main/WXQ005&emoji=true&udp=true&tfo=true&scv=true&insert=false&config=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini" -o WXQ005.yaml

      # 转换 WXY
      - name: Convert WXY
        run: |

          curl "http://127.0.0.1:25500/sub?target=clash&url=https://raw.githubusercontent.com/JettKing/Nodal/main/WXY003&emoji=true&udp=true&tfo=true&scv=true&insert=false&config=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini" -o WXY003.yaml

      # 转换 vpn（小写）
      - name: Convert vpn
        run: |

          curl "http://127.0.0.1:25500/sub?target=clash&url=https://raw.githubusercontent.com/JettKing/Nodal/main/vpn&emoji=true&udp=true&tfo=true&scv=true&insert=false&config=https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/config/ACL4SSR_Online.ini" -o vpn.yaml

      # 提交 YAML
      - name: Push YAML
        run: |

          git config --global user.name "github-actions"

          git config --global user.email "actions@github.com"

          git add *.yaml

          git commit -m "Auto update yaml" || echo "No changes"

          git push || echo "No changes"